<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RutaBoss</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00205B">
</head>
<body>
    <div class="watermark"></div>

    <div id="app"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden">
        <button class="nav-item active" data-target="inicio">
            <span class="icon">🏠</span>
            <span>Inicio</span>
        </button>
        <button class="nav-item" data-target="mapa">
            <span class="icon">🗺️</span>
            <span>Mapa</span>
        </button>
        <button class="nav-item" data-target="paquetes">
            <span class="icon">📦</span>
            <span>Paquetes</span>
        </button>
        <button class="nav-item" data-target="mas">
            <span class="icon">☰</span>
            <span>Más</span>
        </button>
    </nav>

    <!-- TEMPLATES -->
    
    <!-- Login -->
    <template id="tpl-login">
        <div class="view login-view">
            <div class="text-center" style="margin: 3rem 0;">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--color-primary);">RB Logistics</h1>
                <p style="color: var(--color-text-light);">Acceso a Operativa</p>
            </div>
            <div class="card">
                <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Seleccionar Perfil</h2>
                <button class="btn btn-primary btn-large role-btn" data-role="repartidor">Repartidor</button>
                <button class="btn btn-secondary btn-large role-btn" data-role="encargado">Encargado</button>
                
                <div id="encargado-login" class="hidden mt-4">
                    <label for="password">Contraseña de acceso</label>
                    <input type="password" id="password" class="input-large" placeholder="1234">
                    <button class="btn btn-primary btn-large w-full" id="btn-login-encargado">Entrar</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Dashboard Encargado (Rutas) -->
    <template id="tpl-dashboard-encargado">
        <div class="view dashboard-view">
            <header class="app-header">
                <div class="header-left">
                    <h2>Panel Encargado</h2>
                </div>
                <button class="btn-icon btn-salir" title="Cerrar sesión">🚪</button>
            </header>
            
            <div class="dashboard-stats">
                <div class="stat-card horaria">
                    <span class="stat-value" id="stat-horaria">0</span>
                    <span class="stat-label">Horarias Totales</span>
                </div>
                <div class="stat-card tienda">
                    <span class="stat-value" id="stat-tienda">0</span>
                    <span class="stat-label">Tiendas Totales</span>
                </div>
            </div>

            <div class="section-title flex-between" style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Rutas / Sectores</h3>
                <button class="btn btn-primary btn-sm action-crear-ruta">+ Crear Ruta</button>
            </div>
            
            <div id="rutas-list" style="display:flex; flex-direction:column; gap:1rem;"></div>
            
            <div class="section-title mt-4">
                <h3>Últimos Paquetes</h3>
            </div>
            <div id="paquetes-list"></div>
        </div>
    </template>
    
    <!-- Plantilla Ruta Card -->
    <template id="tpl-ruta-card">
        <div class="card ruta-card" style="border-left: 5px solid var(--color-primary);">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 0.5rem;">
                <h3 class="ruta-nombre" style="margin:0; font-size: 1.3rem;">Ruta</h3>
                <span class="badge badge-asignado ruta-repartidor"></span>
            </div>
            <div class="ruta-stats" style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem; margin-bottom: 1rem; color: var(--color-text-light); font-size:0.9rem;">
                <div>📦 <span class="ruta-totales">0</span> paquetes</div>
                <div>🏪 <span class="ruta-tiendas">0</span> tiendas</div>
                <div>⏱️ <span class="ruta-horarias">0</span> horarias</div>
                <div>🏢 <span class="ruta-bloques">0</span> bloques</div>
                <div>💶 <span class="ruta-cobros">0</span> cobros</div>
            </div>
            <button class="btn btn-accent btn-large w-full action-cargar-paquete">+ Cargar Paquete</button>
        </div>
    </template>

    <!-- Crear Ruta -->
    <template id="tpl-crear-ruta">
        <div class="view crear-ruta-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2>Crear Ruta</h2>
                </div>
            </header>
            <div class="card">
                <label>Número de Ruta</label>
                <input type="number" id="form-ruta-num" class="input-large" placeholder="Ej: 5">
                
                <label>Nombre/Sector</label>
                <input type="text" id="form-ruta-nombre" class="input-large" placeholder="Ej: Ruta 5 (Centro)">
                
                <label>Repartidor Asignado (opcional)</label>
                <select id="form-ruta-repartidor" class="input-large">
                    <option value="">Sin asignar</option>
                </select>
                
                <button class="btn btn-primary btn-large w-full mt-4 action-guardar-ruta">Guardar Ruta</button>
            </div>
        </div>
    </template>

    <!-- Crear Paquete -->
    <template id="tpl-crear-paquete">
        <div class="view crear-paquete-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2>Cargar Paquete</h2>
                </div>
            </header>
            <div class="card">
                <h3 id="form-paq-ruta-nombre" class="mb-2" style="color:var(--color-primary-light);">En Ruta</h3>
                
                <label>Cliente</label>
                <input type="text" id="form-paq-cliente" class="input-large" placeholder="Nombre completo">
                
                <label>Teléfono</label>
                <input type="tel" id="form-paq-tel" class="input-large" placeholder="600000000">
                
                <label>Dirección</label>
                <input type="text" id="form-paq-dir" class="input-large" placeholder="Calle, número...">
                
                <label>Piso/Puerta</label>
                <input type="text" id="form-paq-piso" class="input-large" placeholder="1A, Local...">
                
                <div style="display:flex; gap:1rem; flex-wrap:wrap; margin: 1rem 0;">
                    <label style="display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" id="form-paq-horaria"> Es Horaria</label>
                    <label style="display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" id="form-paq-tienda"> Es Tienda</label>
                    <label style="display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" id="form-paq-bloque"> Es Bloque</label>
                    <label style="display:flex; align-items:center; gap:0.5rem;"><input type="checkbox" id="form-paq-cobro"> Tiene Cobro</label>
                </div>
                
                <div id="container-importe" class="hidden">
                    <label>Importe a cobrar (€)</label>
                    <input type="number" id="form-paq-importe" class="input-large" value="0">
                </div>
                
                <button class="btn btn-success btn-large w-full mt-4 action-guardar-paquete">Generar Código</button>
            </div>
        </div>
    </template>

    <!-- Pantalla Escribir Código -->
    <template id="tpl-escribir-codigo">
        <div class="view escribir-codigo-view text-center">
            <header class="app-header">
                <div class="header-left">
                    <h2>Escribir en Paquete</h2>
                </div>
            </header>
            <div class="card" style="margin-top: 3rem; padding: 3rem 1rem;">
                <p class="mb-2 text-light">Copia esto en grande en el paquete:</p>
                <div id="display-codigo-fisico" style="font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 2rem; color: var(--color-primary);">
                    45/2 TIENDA
                </div>
                <button class="btn btn-primary btn-large w-full action-marcar-escrito">✅ Marcar código escrito</button>
            </div>
        </div>
    </template>

    <!-- Selector Repartidor -->
    <template id="tpl-selector-repartidor">
        <div class="view selector-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2>¿Quién eres?</h2>
                </div>
                <button class="btn-icon btn-salir" title="Salir">🚪</button>
            </header>
            <div class="card">
                <p class="mb-2">Selecciona tu perfil para ver tu ruta:</p>
                <div id="repartidores-lista-botones" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
            </div>
        </div>
    </template>

    <!-- Panel Repartidor (Mi Ruta) -->
    <template id="tpl-panel-repartidor">
        <div class="view repartidor-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2 id="ruta-title">Mi Ruta</h2>
                </div>
                <button class="btn-icon btn-salir" title="Cerrar sesión">🚪</button>
            </header>
            
            <div class="map-placeholder">
                <span>📍 Mapa Simulado</span>
            </div>

            <div class="section-title">
                <h3>Pendientes (<span id="count-pendientes">0</span>)</h3>
            </div>
            
            <div id="mis-paquetes-list"></div>
        </div>
    </template>
    
    <!-- Componente Tarjeta Paquete (Lista) -->
    <template id="tpl-paquete-card">
        <div class="card paquete-card">
            <div class="paquete-header" style="margin-bottom:0.75rem;">
                <span class="paquete-fisico" style="font-size:1.4rem; font-weight:900; color:var(--color-primary);"></span>
                <span class="paquete-asignado badge hidden"></span>
            </div>
            <div class="paquete-cliente" style="font-size: 1.1rem; font-weight:bold; margin-bottom:0.25rem;"></div>
            <div class="paquete-body">
                <p><strong>📞</strong> <span class="paquete-tel"></span></p>
                <p><strong>📍</strong> <span class="paquete-dir"></span></p>
                <p class="paquete-ruta-info" style="font-size:0.85rem; color:var(--color-text-light); margin-top:0.2rem;"><strong>Ruta:</strong> <span></span></p>
            </div>
            <div class="paquete-actions" style="margin-top:0.5rem;">
                <button class="btn btn-secondary btn-sm action-ver" style="width:100%;">Ver Detalle ➔</button>
            </div>
        </div>
    </template>

    <!-- Detalle de Paquete -->
    <template id="tpl-detalle-paquete">
        <div class="view detalle-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2>Detalle <span class="det-id" style="font-size:1rem; color:var(--color-text-light);"></span></h2>
                </div>
            </header>
            
            <div class="card text-center" style="background:var(--color-bg); border:none; padding:1rem;">
                <div class="det-fisico" style="font-size: 2.5rem; font-weight: 900; color: var(--color-primary); line-height:1;"></div>
            </div>

            <div class="card mt-2">
                <div class="cliente-info"><strong>👤</strong> <span class="det-cliente"></span></div>
                <div style="font-size: 1.1rem; color: var(--color-primary); margin-bottom: 0.5rem;">
                    <strong>📞</strong> <span class="det-tel"></span>
                </div>
                
                <div class="big-address det-dir"></div>
                
                <div class="pago-info det-pago"></div>
                
                <div class="btn-group mt-2">
                    <button class="btn btn-secondary action-llamar">📞 Llamar <span class="det-llamadas text-sm">(0)</span></button>
                    <button class="btn btn-success action-whatsapp">💬 Mensaje</button>
                </div>
                <button class="btn btn-secondary btn-large w-full mt-2 action-maps">📍 Abrir en Maps</button>
            </div>

            <div class="card" id="card-acciones">
                <label for="nota">Nota (opcional)</label>
                <input type="text" id="nota" class="input-large" placeholder="Escribe algo aquí...">
                
                <div class="action-grid">
                    <button class="btn btn-success btn-large action-entregado">✓ Entregado</button>
                    <button class="btn btn-danger btn-large action-no-entregado">✗ No Entregado</button>
                </div>

                <div id="incidencia-panel" class="hidden mt-2">
                    <label>Motivo de incidencia:</label>
                    <select id="motivo" class="input-large">
                        <option value="">Seleccionar...</option>
                        <option value="No contesta">No contesta</option>
                        <option value="Ausente">Ausente</option>
                        <option value="Tienda cerrada">Tienda cerrada</option>
                        <option value="Dirección incorrecta">Dirección incorrecta</option>
                        <option value="Reintentar">Reintentar luego</option>
                    </select>
                    <button class="btn btn-danger btn-large w-full action-guardar-incidencia">Confirmar Fallido</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- View Placeholder -->
    <template id="tpl-view-placeholder">
        <div class="view placeholder-view">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon btn-volver">🔙</button>
                    <h2 class="view-title"></h2>
                </div>
            </header>
            <div class="empty-state">
                <div class="icon">🚧</div>
                <p>Módulo en construcción</p>
            </div>
        </div>
    </template>

    <script src="data.js"></script>
    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="routes.js"></script>
    <script src="app.js"></script>
</body>
</html>
